{# vim: set et ts=8 sts=4 sw=4 ai: #}
<div class="pageindex-columns" style="">
{% for letter, pagelist in pages.items()|sort %}
<div class="pageindex-letterblock"><h2 class="content-title font-weight-bolder pageindex-header">{{letter}}</h2>
{% for page in pagelist %}
<div class="pageindex-pageblock pageindex-depth-{{page.depth}}" style="padding-left:{{1.5 * page.depth}}rem;">
<a href="{{ page.url }}" class="global-toc-link {% if page.has_children -%}
pageindex-folder font-weight-bold
{%- else -%}
pageindex-page
{%- endif %} pageindex-depth-{{page.depth}}">{{page.title}}</a>
{% if page.toc %}
<div class="pagetoc"{% if hide_toc %} style="display: none;"{% endif %}>
{% for tocdepth, header, url in page.toc %}
<div style="word-break: all; padding-left:{{1 * tocdepth}}rem;" class="pageindex-heading-{{tocdepth}}">
<a href="{{ url }}" class="global-toc-link font-weight-light font-italic pageindex-heading pageindex-heading-{{tocdepth}}">{{header}}</a><br/>
</div>
{% endfor %}
</div>
{% endif %}{# page_toc #}
</div>
{% endfor %}
</div>
{% endfor %}
</div>
